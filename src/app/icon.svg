<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blue background box -->
  <rect x="0" y="0" width="32" height="32" fill="#1e88e5"/>
  <!-- Pixel border -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#1565c0" stroke-width="2"/>
  <!-- Y pixel letter -->
  <rect x="4" y="4" width="2" height="2" fill="#fff"/>
  <rect x="10" y="4" width="2" height="2" fill="#fff"/>
  <rect x="5" y="6" width="2" height="2" fill="#fff"/>
  <rect x="9" y="6" width="2" height="2" fill="#fff"/>
  <rect x="6" y="8" width="4" height="2" fill="#fff"/>
  <rect x="7" y="10" width="2" height="4" fill="#fff"/>
  <!-- J pixel letter -->
  <rect x="16" y="4" width="8" height="2" fill="#fff"/>
  <rect x="21" y="6" width="2" height="6" fill="#fff"/>
  <rect x="17" y="10" width="2" height="2" fill="#fff"/>
  <rect x="19" y="10" width="2" height="2" fill="#fff"/>
  <rect x="17" y="12" width="6" height="2" fill="#fff"/>
  <!-- Bottom decorative pixels -->
  <rect x="4" y="16" width="24" height="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="6" y="20" width="2" height="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="12" y="22" width="2" height="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="18" y="20" width="2" height="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="24" y="22" width="2" height="2" fill="rgba(255,255,255,0.5)"/>
</svg>
